<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THUMOS14 Classification Metrics vs Budget</title>
<style>
  :root { --color-text-primary:#1a1a1a; --color-text-secondary:#555; --color-text-tertiary:#888; --color-background-secondary:#f5f5f5; --color-border-tertiary:#ddd; --border-radius-md:8px; }
  body { font-family: Arial, sans-serif; margin:0; padding:16px; background:#fff; color:#1a1a1a; }
  select, input[type=radio] { cursor:pointer; }
  select { border:1px solid #ccc; border-radius:4px; background:#fff; padding:4px 8px; font-size:12px; }
</style>
</head>
<body>

<h2 style="margin:0 0 4px;font-size:18px">Classification Metrics vs Review Budget</h2>
<p style="margin:0 0 12px;font-size:12px;color:#555">90% AI + K% human reviewer · oracle correction · THUMOS14</p>

<div style="display:flex;align-items:center;gap:16px;margin-bottom:12px;flex-wrap:wrap">
  <div style="display:flex;gap:12px;font-size:12px">
    <label style="display:flex;align-items:center;gap:4px">
      <input type="radio" name="bb" value="af" checked> ActionFormer (66.92%)
    </label>
    <label style="display:flex;align-items:center;gap:4px">
      <input type="radio" name="bb" value="td"> TriDet (61.29%)
    </label>
  </div>
  <select id="metricSel">
    <option value="f1">F1 score</option>
    <option value="prec">Precision</option>
    <option value="rec">Recall</option>
    <option value="acc">Accuracy</option>
  </select>
</div>

<div style="background:#f5f5f5;border-radius:8px;padding:12px;margin-bottom:12px">
  <div style="position:relative;height:280px"><canvas id="mainChart"></canvas></div>
</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
  <div style="background:#f5f5f5;border-radius:8px;padding:12px">
    <p style="font-size:10px;font-weight:500;color:#555;margin:0 0 8px;text-transform:uppercase;letter-spacing:.04em">All 4 metrics — conf_contrast</p>
    <div style="position:relative;height:200px"><canvas id="detailChart1"></canvas></div>
  </div>
  <div style="background:#f5f5f5;border-radius:8px;padding:12px">
    <p style="font-size:10px;font-weight:500;color:#555;margin:0 0 8px;text-transform:uppercase;letter-spacing:.04em">All 4 metrics — conf_variance</p>
    <div style="position:relative;height:200px"><canvas id="detailChart2"></canvas></div>
  </div>
</div>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px" id="statCards"></div>
<div style="display:flex;flex-wrap:wrap;gap:6px;font-size:11px;color:#555" id="legend"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const BACKBONES = {
  af: {
    label:'ActionFormer', baseMap:66.92,
    N:20655, N_TP:5389, N_FP:835, N_FN:4979, N_TN:9452,
    signals:{
      conf_contrast:{label:'conf_contrast', color:'#E24B4A', dash:[], fn:0.216, fp:0.000},
      conf_variance:{label:'conf_variance', color:'#185FA5', dash:[], fn:0.204, fp:0.073},
      tca_full:     {label:'tca_full',      color:'#1D9E75', dash:[], fn:0.181, fp:0.000},
      feat_norm:    {label:'feat_norm',     color:'#BA7517', dash:[4,2], fn:0.180, fp:0.000},
      tca_causal:   {label:'tca_causal',   color:'#1D9E75', dash:[6,3], fn:0.164, fp:0.000},
      pca_motion:   {label:'pca_motion',   color:'#7F77DD', dash:[4,2], fn:0.157, fp:0.000},
      gradient_feat:{label:'gradient_feat',color:'#7F77DD', dash:[6,3], fn:0.148, fp:0.029},
      z_global:     {label:'z_global',     color:'#888780', dash:[], fn:0.134, fp:0.000},
      gradient_raw: {label:'gradient_raw', color:'#888780', dash:[4,2], fn:0.127, fp:0.025},
      z_local:      {label:'z_local',      color:'#888780', dash:[6,3], fn:0.110, fp:0.013},
      confidence:   {label:'confidence',   color:'#E24B4A', dash:[8,4], fn:0.000, fp:0.260},
      random:       {label:'random',       color:'#B4B2A9', dash:[8,4], fn:0.100, fp:0.100},
      oracle:       {label:'oracle',       color:'#3B6D11', dash:[4,4], fn:0.357, fp:0.356},
    }
  },
  td: {
    label:'TriDet', baseMap:61.29,
    N:20655, N_TP:5621, N_FP:907, N_FN:4747, N_TN:9380,
    signals:{
      conf_contrast:{label:'conf_contrast', color:'#E24B4A', dash:[], fn:0.252, fp:0.000},
      conf_variance:{label:'conf_variance', color:'#185FA5', dash:[], fn:0.216, fp:0.050},
      feat_norm:    {label:'feat_norm',     color:'#BA7517', dash:[4,2], fn:0.190, fp:0.003},
      tca_full:     {label:'tca_full',      color:'#1D9E75', dash:[], fn:0.185, fp:0.002},
      tca_causal:   {label:'tca_causal',   color:'#1D9E75', dash:[6,3], fn:0.171, fp:0.001},
      pca_motion:   {label:'pca_motion',   color:'#7F77DD', dash:[4,2], fn:0.161, fp:0.007},
      gradient_feat:{label:'gradient_feat',color:'#7F77DD', dash:[6,3], fn:0.153, fp:0.020},
      z_global:     {label:'z_global',     color:'#888780', dash:[], fn:0.138, fp:0.006},
      gradient_raw: {label:'gradient_raw', color:'#888780', dash:[4,2], fn:0.132, fp:0.014},
      z_local:      {label:'z_local',      color:'#888780', dash:[6,3], fn:0.110, fp:0.013},
      confidence:   {label:'confidence',   color:'#E24B4A', dash:[8,4], fn:0.000, fp:0.179},
      random:       {label:'random',       color:'#B4B2A9', dash:[8,4], fn:0.102, fp:0.096},
      oracle:       {label:'oracle',       color:'#3B6D11', dash:[4,4], fn:0.366, fp:0.361},
    }
  }
};

const MAP_CEIL = 80.0;
const budgets = Array.from({length:100},(_,i)=>(i+1)/100);
const BPct = budgets.map(b=>Math.round(b*100));
let currentBB = 'af';

function interp(val10) {
  return budgets.map(b => {
    const t=b/0.10;
    if(t<=1) return val10*Math.pow(t,0.7);
    return val10+(1-val10)*(1-Math.pow(1-(t-1)/9,1.5));
  });
}

function computeMetrics(d) {
  const BASE_REC = d.N_TP/(d.N_TP+d.N_FN);
  const result = {};
  Object.entries(d.signals).forEach(([k,v]) => {
    const fn_c=interp(v.fn), fp_c=interp(v.fp);
    result[k] = budgets.map((b,i) => {
      const fn_fixed=fn_c[i]*d.N_FN, fp_fixed=fp_c[i]*d.N_FP;
      const tp=d.N_TP+fn_fixed, fp=d.N_FP-fp_fixed, fn=d.N_FN-fn_fixed, tn=d.N_TN+fp_fixed;
      const prec=tp/Math.max(1,tp+fp), rec=tp/Math.max(1,tp+fn);
      const f1=2*prec*rec/Math.max(1e-8,prec+rec), acc=(tp+tn)/d.N;
      return {f1,prec,rec,acc};
    });
  });
  return result;
}

const commonOpts = (yMin, yLabel) => ({
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:c=>`${c.dataset.label}: ${c.raw.toFixed(1)}%`}}},
  scales:{
    x:{ticks:{maxTicksLimit:6,callback:(v,i)=>BPct[i]+'%'},grid:{color:'rgba(128,128,128,0.08)'},title:{display:true,text:'review budget (%)',font:{size:10}}},
    y:{min:yMin,max:100,ticks:{callback:v=>v+'%'},grid:{color:'rgba(128,128,128,0.08)'},title:{display:!!yLabel,text:yLabel||'',font:{size:10}}},
  },
  animation:{duration:200},
});

let mainChart, detailCharts={};

function buildMain(metric) {
  if(mainChart) mainChart.destroy();
  const d=BACKBONES[currentBB], m=computeMetrics(d);
  const yMins={f1:40,prec:55,rec:50,acc:55};
  mainChart = new Chart(document.getElementById('mainChart'), {
    type:'line',
    data:{labels:BPct, datasets:Object.entries(d.signals).map(([k,v])=>({
      label:v.label, data:m[k].map(x=>parseFloat((x[metric]*100).toFixed(2))),
      borderColor:v.color, borderDash:v.dash, borderWidth:2, pointRadius:0, tension:0.3, fill:false,
    }))},
    options:commonOpts(yMins[metric]||40, metric+' (%)')
  });
  updateCards(metric);
}

function buildDetail(canvasId, key) {
  if(detailCharts[canvasId]) detailCharts[canvasId].destroy();
  const d=BACKBONES[currentBB], m=computeMetrics(d);
  const MCOLS={f1:'#E24B4A',prec:'#185FA5',rec:'#1D9E75',acc:'#BA7517'};
  detailCharts[canvasId] = new Chart(document.getElementById(canvasId), {
    type:'line',
    data:{labels:BPct, datasets:[
      {label:'F1',       data:m[key].map(x=>parseFloat((x.f1*100).toFixed(2))),  borderColor:MCOLS.f1,  borderWidth:2,pointRadius:0,tension:0.3,fill:false,borderDash:[]},
      {label:'Precision',data:m[key].map(x=>parseFloat((x.prec*100).toFixed(2))),borderColor:MCOLS.prec,borderWidth:2,pointRadius:0,tension:0.3,fill:false,borderDash:[4,2]},
      {label:'Recall',   data:m[key].map(x=>parseFloat((x.rec*100).toFixed(2))), borderColor:MCOLS.rec, borderWidth:2,pointRadius:0,tension:0.3,fill:false,borderDash:[6,3]},
      {label:'Accuracy', data:m[key].map(x=>parseFloat((x.acc*100).toFixed(2))), borderColor:MCOLS.acc, borderWidth:2,pointRadius:0,tension:0.3,fill:false,borderDash:[2,2]},
    ]},
    options:commonOpts(50, null)
  });
}

function updateCards(metric) {
  const d=BACKBONES[currentBB], m=computeMetrics(d);
  const ranked = Object.entries(d.signals).map(([k,v])=>({
    key:k, label:v.label, color:v.color, val:m[k][9][metric]
  })).sort((a,b)=>b.val-a.val).slice(0,4);
  const names={f1:'F1',prec:'Precision',rec:'Recall',acc:'Accuracy'};
  document.getElementById('statCards').innerHTML = ranked.map((r,i)=>`
    <div style="background:#f5f5f5;border-radius:8px;padding:10px;border:0.5px solid #ddd">
      <p style="font-size:10px;color:#555;margin:0 0 4px">#${i+1} ${names[metric]}@10%</p>
      <p style="font-size:20px;font-weight:500;margin:0;color:#1a1a1a">${(r.val*100).toFixed(1)}%</p>
      <p style="font-size:11px;margin:4px 0 0;color:#555">${r.label}</p>
      <div style="height:3px;border-radius:2px;background:${r.color};margin-top:6px;width:${Math.round(r.val*100)}%"></div>
    </div>`).join('');
}

function buildAll(metric) {
  buildMain(metric||document.getElementById('metricSel').value);
  buildDetail('detailChart1','conf_contrast');
  buildDetail('detailChart2','conf_variance');
  buildLegend();
}

function buildLegend() {
  const d=BACKBONES[currentBB];
  const MCOLS2={f1:'#E24B4A',prec:'#185FA5',rec:'#1D9E75',acc:'#BA7517'};
  const metricPart = ['F1 f1','Precision prec','Recall rec','Accuracy acc'].map(s=>{
    const[l,k]=s.split(' ');
    return `<span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:${MCOLS2[k]}"></span><span>${l}</span></span>`;
  }).join('');
  const sigPart = Object.entries(d.signals).map(([k,v])=>
    `<span style="display:flex;align-items:center;gap:3px;padding:2px 6px;border-radius:4px;border:0.5px solid #ddd"><span style="display:inline-block;width:18px;height:2px;background:${v.color};border-radius:1px"></span><span style="font-size:10px;color:#555">${v.label}</span></span>`
  ).join('');
  document.getElementById('legend').innerHTML = `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">${metricPart}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${sigPart}</div>`;
}

buildAll('f1');

document.getElementById('metricSel').addEventListener('change', e=>buildAll(e.target.value));
document.querySelectorAll('input[name="bb"]').forEach(r=>r.addEventListener('change',e=>{currentBB=e.target.value;buildAll();}));
</script>
</body>
</html>
